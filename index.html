<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sklad</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<section class="page">
        <nav>
            <button onclick="Prehled()">Přehled</button>
            <button>Příjem zboží</button>
            <button>Výdej zboží</button>
            <button>Historie</button>
            <button onclick="Export()">Export CSV</button>
            <button>Import CSV</button>
        </nav>

    <section class="hlavnisekce">
        <div class="toolbar" id="toolbar">
            <button onclick="Pridatzbozi()">+ Přidat produkt</button>
            <button>- Odebrat produkt</button>
            <button>Upravit produkt</button>
        </div>

        <section class="sekce1" id="sekce1">
            <input type="search" placeholder="Vyhledat zboží..." class="vyhledavac"> 
            <select id="filtr" name="filtr" class="filtr">
                <option value="all">Všechno</option>
                <option value="skladem">Skladem</option>
                <option value="Není skladem">Není skladem</option>
                <option value="WIP">WIP</option>
                <option value="WIP">WIP</option>
            </select>
            <table id="main">
            <tr>
                <th class="stav">Stav</th>
                <th class="nazev">Název</th>
                <th class="mnozstvi">Počet kusů</th>
                <th class="kd">Kód</th>
                <th class="idid">ID</th>
            </tr>
            <tr>
                <td>🟢Skladem</td>
                <td>Rohlík</td>
                <td>240 Ks</td>
                <td>001</td>
                <td>1</td>
            </tr>
            </table>
        </section>

    </section>

</section>
<script src="skript.js"></script>
</body>
</html>
